name: Deploy OCP Matchmaker to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ocp-matchmaker/package-lock.json

      - name: Install dependencies
        run: cd ocp-matchmaker && npm ci

      - name: Build
        run: cd ocp-matchmaker && npm run build

      - name: Commit built files to root for GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp ocp-matchmaker/dist/index.html index.html
          cp -r ocp-matchmaker/dist/assets assets
          touch .nojekyll

          git add index.html assets/ .nojekyll --force

          if git diff --cached --quiet; then
            echo "No changes — build output is unchanged."
          else
            git commit -m "chore: build OCP Matchmaker [skip ci]"
            git push origin main
          fi
